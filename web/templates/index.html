<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG 知识库</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <!-- 左栏：知识库管理 -->
    <aside id="sidebar">
        <div class="sidebar-header">
            <h2>📄 知识库</h2>
        </div>

        <!-- 拖拽上传区域 -->
        <div id="drop-zone" ondragover="event.preventDefault()" ondrop="handleDrop(event)">
            <div class="drop-icon">📁</div>
            <p>拖拽文件到此处上传</p>
            <p class="drop-hint">支持 txt / md / pdf</p>
            <input type="file" id="file-input" accept=".txt,.md,.pdf" onchange="handleFileSelect(event)" hidden
                multiple>
            <button onclick="document.getElementById('file-input').click()" class="btn-select">选择文件</button>
        </div>

        <!-- 已导入文件列表 -->
        <div id="file-list">
            <div class="file-list-title">已导入的文档</div>
            <div id="file-items">
                <div class="file-item-empty">暂无文档，请上传</div>
            </div>
        </div>
    </aside>

    <!-- 右栏：对话区 -->
    <main id="chat-area">
        <div class="chat-header">
            <h1>🔍 RAG 知识库</h1>
        </div>

        <!-- 消息列表 -->
        <div id="messages">
            <div class="message welcome">
                <div class="msg-avatar">🤖</div>
                <div class="msg-content">
                    <p>你好！我是知识助手。</p>
                    <p>请在左下角输入你的问题，我会基于知识库为你回答。</p>
                </div>
            </div>
        </div>

        <!-- 输入区 -->
        <div class="chat-input">
            <input type="text" id="question-input" placeholder="请输问题..."
                onkeydown="if(event.key==='Enter')sendMessage()">
            <button onclick="sendMessage()" id="send-btn">发送</button>
        </div>
    </main>

    <script>
        // ===== 会话 ID（页面加载时生成一次） =====
        const sessionId = 'sess_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);

        // ===== 文件上传 =====

        function uploadFile(file) {
            const formData = new FormData();
            formData.append('file', file);

            fetch('/api/upload', { method: 'POST', body: formData })
                .then(res => res.json())
                .then(data => {
                    if (data.ok) {
                        // 上传成功后直接加到列表，填充已知信息
                        addFileItem({
                            filename: data.filename,
                            chunk_count: data.chunkCount || 0,
                            created_at: '刚刚',
                        });
                    } else {
                        alert('上传失败: ' + (data.msg || data.error));
                    }
                })
                .catch(err => alert('上传失败: ' + err));
        }

        function handleDrop(e) {
            e.preventDefault();
            const files = e.dataTransfer.files;
            for (const file of files) {
                uploadFile(file);
            }
        }

        function handleFileSelect(e) {
            const files = e.target.files;
            for (const file of files) {
                uploadFile(file);
            }
            e.target.value = '';
        }

        // file 参数是对象：{filename, chunk_count, created_at}
        function addFileItem(file) {
            const container = document.getElementById('file-items');
            const empty = container.querySelector('.file-item-empty');
            if (empty) empty.remove();

            const div = document.createElement('div');
            div.className = 'file-item';

            const span = document.createElement('span');
            span.className = 'file-item-text';
            span.textContent = '📎 ' + file.filename
                + ' · ' + (file.chunk_count || 0) + ' chunks'
                + ' · ' + (file.created_at || '');

            const btn = document.createElement('button');
            btn.className = 'btn-delete-file';
            btn.textContent = '✕';
            btn.title = '删除此文档';
            btn.onclick = function () {
                deleteFile(file.filename, div);
            };

            div.appendChild(span);
            div.appendChild(btn);
            container.prepend(div);
        }

        function deleteFile(filename, domElement) {
            if (!confirm('确定要删除 "' + filename + '" 吗？此操作不可撤销。')) {
                return;
            }

            fetch('/api/file/' + encodeURIComponent(filename), { method: 'DELETE' })
                .then(res => res.json())
                .then(data => {
                    if (data.ok) {
                        domElement.remove();

                        const container = document.getElementById('file-items');
                        if (container.children.length === 0) {
                            const empty = document.createElement('div');
                            empty.className = 'file-item-empty';
                            empty.textContent = '暂无文档，请上传';
                            container.appendChild(empty);
                        }
                    } else {
                        alert('删除失败: ' + (data.msg || '未知错误'));
                    }
                })
                .catch(err => alert('删除失败: ' + err));
        }

        // ===== 聊天 =====

        function sendMessage() {
            const input = document.getElementById('question-input');
            const question = input.value.trim();
            if (!question) return;

            // 显示用户消息
            appendMessage('user', question);
            input.value = '';
            input.disabled = true;
            document.getElementById('send-btn').disabled = true;

            // 创建 AI 回答气泡
            const msgDiv = appendMessage('assistant', '');
            const contentDiv = msgDiv.querySelector('.msg-content');

            // SSE 流式接收（带上 session_id）
            const url = '/api/chat/stream?q=' + encodeURIComponent(question)
                + '&session_id=' + encodeURIComponent(sessionId);
            const eventSource = new EventSource(url);

            eventSource.addEventListener('token', function (e) {
                contentDiv.textContent += e.data;
                document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
            });

            eventSource.addEventListener('error', function (e) {
                contentDiv.textContent += ' [回答出错]';
                eventSource.close();
                input.disabled = false;
                document.getElementById('send-btn').disabled = false;
            });

            eventSource.addEventListener('done', function (e) {
                eventSource.close();
                input.disabled = false;
                document.getElementById('send-btn').disabled = false;
                input.focus();
            });
        }

        function appendMessage(role, text) {
            const messages = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = 'message ' + role;
            div.innerHTML = '<div class="msg-avatar">' + (role === 'user' ? '👤' : '🤖') + '</div>' +
                '<div class="msg-content">' + text + '</div>';
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
            return div;
        }

        // ===== 页面加载时读取已有文件 =====
        window.addEventListener('DOMContentLoaded', function () {
            fetch('/api/file')
                .then(res => res.json())
                .then(data => {
                    if (data.files && data.files.length > 0) {
                        for (const f of data.files) {
                            addFileItem(f);
                        }
                    }
                });
        });
    </script>
</body>

</html>
